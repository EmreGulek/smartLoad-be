spring.application.name=smartload-backend

# Database — override in production (Neon, Render, etc.)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartload}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:smartload}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:smartload_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

# Migration strategy per ADR-0011: docs/sql/ for PostgreSQL-specific bits (JSONB, GIN, ...)
# + Hibernate ddl-auto=update for entity-driven schema evolution. Geçici çözüm — Faz 6
# production hazırlığında Flyway baseline'a geçilecek.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Optional local overrides: copy .env.example → .env (gitignored)
spring.config.import=optional:file:.env[.properties]

# Mail — leave empty locally if email verification is not needed
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Render/Heroku set PORT; local dev may use SERVER_PORT
server.port=${PORT:${SERVER_PORT:8080}}
server.error.include-message=always
server.error.include-binding-errors=always

logging.level.root=INFO
logging.level.com.smartload=DEBUG
logging.level.org.hibernate.SQL=WARN

# JWT — required for login (set SECURITY_JWT_SECRET_KEY in .env or Render)
# Generate: openssl rand -base64 32
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY:}
security.jwt.expiration-time=${SECURITY_JWT_EXPIRATION_TIME:3600000}

# CORS — comma-separated origins (Render: your Cloudflare Pages URL)
smartload.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

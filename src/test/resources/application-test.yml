spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  datasource:
    url: jdbc:h2:mem:smartload_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop

# Fixed test secret (Base64) — not used in production
security:
  jwt:
    secret-key: dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3Itc21hcnRsb2FkLXRlc3Rz
    expiration-time: 3600000

smartload:
  cors:
    allowed-origins: http://localhost:5173
